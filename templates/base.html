<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Checklists — Obra 38{% endblock %}</title>
<link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div class="header-brand">
      <span class="brand-sigla">UDE</span>
      <div>
        <div class="brand-titulo">Sistema de Checklists</div>
        <div class="brand-sub">Obra 38 — Recanto das Oliveiras</div>
      </div>
    </div>
    <nav class="app-nav">
      <a href="/" class="nav-link {% if request.path == '/' %}ativo{% endif %}">Dashboard</a>
      <a href="/mapa" class="nav-link {% if request.path == '/mapa' %}ativo{% endif %}">Mapa</a>
      <a href="/relatorio" class="nav-link {% if request.path == '/relatorio' %}ativo{% endif %}">Relatório</a>
      <a href="/checklist/novo" class="nav-btn">+ Novo</a>
    </nav>
  </div>
</header>
<main class="app-main">
  {% block content %}{% endblock %}
</main>
<footer class="app-footer">
  Obra 38 — Recanto das Oliveiras &nbsp;|&nbsp; UDE — Viana &amp; Moura Construções
</footer>
</body>
</html>
