<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sem conexão — UDE Checklists</title>
<meta name="theme-color" content="#5C1A2E">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: #F3F4F6;
    color: #1F2937;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #5C1A2E;
    color: #fff;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-sigla {
    background: #fff;
    color: #5C1A2E;
    font-weight: 900;
    font-size: 18px;
    border-radius: 6px;
    padding: 3px 8px;
    letter-spacing: 1px;
  }
  .brand-titulo { font-size: 15px; font-weight: 700; }
  .brand-sub { font-size: 11px; opacity: .8; }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }
  .icon {
    font-size: 72px;
    margin-bottom: 24px;
    opacity: .6;
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    color: #5C1A2E;
    margin-bottom: 12px;
  }
  p {
    font-size: 16px;
    color: #6B7280;
    max-width: 380px;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .btn-retry {
    background: #5C1A2E;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px 32px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    touch-action: manipulation;
  }
  .btn-retry:hover { background: #7a2540; }
  footer {
    text-align: center;
    padding: 12px;
    font-size: 12px;
    color: #6B7280;
    border-top: 1px solid #E5E7EB;
    background: #fff;
  }
</style>
</head>
<body>
<header>
  <span class="brand-sigla">UDE</span>
  <div>
    <div class="brand-titulo">Sistema de Checklists</div>
    <div class="brand-sub">Obra 38 — Recanto das Oliveiras</div>
  </div>
</header>
<main>
  <div class="icon">📡</div>
  <h1>Você está offline</h1>
  <p>
    Não foi possível conectar ao servidor. Verifique sua conexão com a internet
    ou a rede local da obra e tente novamente.
  </p>
  <button class="btn-retry" onclick="window.location.reload()">
    Tentar novamente
  </button>
</main>
<footer>
  Obra 38 — Recanto das Oliveiras &nbsp;|&nbsp; UDE — Viana &amp; Moura Construções
</footer>
</body>
</html>
